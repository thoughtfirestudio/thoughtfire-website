<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ThoughtFire Studio</title>
  <meta name="description" content="Thoughtful technology for humans." />
  <link rel="stylesheet" href="tokens.css?v=2" />
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body class="holding">

<main class="holding-wrap">

  <div class="orbit-wrap" aria-label="ThoughtFire Studio">
    <svg class="glyph" viewBox="0 0 100 100" aria-hidden="true">
      <circle class="pulse-outer" cx="50" cy="50" r="50" fill="var(--tf-ember)" />
      <circle class="pulse-inner" cx="50" cy="50" r="22" fill="var(--hero-bg)" />
    </svg>
    <svg class="orbit-svg" viewBox="0 0 300 300" aria-hidden="true">
      <defs>
        <path id="orbit-path"
          d="M150,150 m-118,0 a118,118 0 1,1 236,0 a118,118 0 1,1 -236,0"/>
      </defs>
      <text class="orbit-text">
        <textPath href="#orbit-path" startOffset="0%" textLength="741">
          ThoughtFire Studio &nbsp;·&nbsp; ThoughtFire Studio &nbsp;·&nbsp; ThoughtFire Studio &nbsp;·&nbsp; ThoughtFire Studio &nbsp;·&nbsp;
        </textPath>
      </text>
    </svg>
  </div>

  <div class="holding-text">
    <p class="holding-name">ThoughtFire Studio</p>
    <p class="holding-tagline">Thoughtful technology for humans.</p>
    <a class="holding-email" href="mailto:david@thoughtfire.studio">david@thoughtfire.studio</a>
  </div>

</main>

<script>
  // Slow orbit animation
  const orbitText = document.querySelector('.orbit-text');
  if (orbitText) {
    let offset = 0;
    (function tick() {
      offset -= 0.04;
      orbitText.querySelector('textPath').setAttribute('startOffset', offset + '%');
      requestAnimationFrame(tick);
    })();
  }
</script>
</body>
</html>
